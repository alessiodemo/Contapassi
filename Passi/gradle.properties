# Limita la RAM di Gradle a 1.5GB invece di 2GB
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Velocizza la compilazione usando più core ma con meno memoria
org.gradle.parallel=true
org.gradle.caching=true

# Impostazioni AndroidX già presenti
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.overridePathCheck=true